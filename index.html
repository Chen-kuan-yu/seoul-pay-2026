<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾雲端小帳本 🇰🇷 v17.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 已嵌入妳提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyD6kcipt9qW4ySulBTuG8pzmqqceRxjzoA",
            authDomain: "seoul-account.firebaseapp.com",
            projectId: "seoul-account",
            storageBucket: "seoul-account.firebasestorage.app",
            messagingSenderId: "832634318470",
            appId: "1:832634318470:web:2df0dad107aead5ff56b07",
            measurementId: "G-V6FQW3XH57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const recordsCol = collection(db, "seoul_records");

        // 監聽雲端資料庫
        const q = query(recordsCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            window.records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            window.render();
            document.getElementById('summary_status').innerText = "● 雲端已連線";
        }, (error) => {
            console.error(error);
            document.getElementById('summary_status').innerText = "○ 連線失敗 (請檢查 Rules)";
        });

        window.db_addRecord = async (data) => {
            await addDoc(recordsCol, { ...data, createdAt: serverTimestamp() });
        };
        window.db_deleteRecord = async (id) => {
            await deleteDoc(doc(db, "seoul_records", id));
        };
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-blur { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.85); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#FFF9F9] min-h-screen pb-32">

    <nav class="sticky top-0 z-20 ios-blur border-b border-rose-100 p-4 text-center">
        <h1 class="text-xl font-black text-rose-600 tracking-tighter">SEOUL LEDGER 🇰🇷</h1>
        <div class="flex justify-center items-center gap-2 mt-1">
            <span id="summary_status" class="text-[9px] font-bold text-rose-400 uppercase tracking-widest">連線中...</span>
            <div id="summary_text" class="text-[11px] text-gray-500 font-medium italic"></div>
        </div>
    </nav>

    <div class="p-4 max-w-md mx-auto">
        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-rose-100/50 p-7 mb-8 border border-rose-50">
            <div class="mb-5">
                <label class="block text-[10px] text-gray-400 mb-2 font-black uppercase tracking-[0.1em]">Payer / 類型</label>
                <div class="flex bg-gray-100/80 rounded-2xl p-1 gap-1">
                    <button onclick="setPayer('冠妤')" id="btnA" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-rose-500 text-white shadow-md">冠妤</button>
                    <button onclick="setPayer('哲永')" id="btnB" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-gray-400">哲永</button>
                    <button onclick="setPayer('共同')" id="btnJoint" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-gray-400">共同</button>
                    <button onclick="setPayer('個人')" id="btnPrivate" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-gray-400">個人</button>
                </div>
            </div>

            <div id="privateOwnerArea" class="hidden mb-5 animate-fade-in">
                <div class="flex bg-purple-50 rounded-xl p-1 gap-1 border border-purple-100">
                    <button onclick="setPrivateOwner('冠妤')" id="pBtnA" class="flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-500 text-white">冠妤私物</button>
                    <button onclick="setPrivateOwner('哲永')" id="pBtnB" class="flex-1 py-2 rounded-lg text-[10px] font-bold text-purple-300">哲永私物</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5 mb-5">
                <div id="singleAmountArea">
                    <label class="block text-[10px] text-gray-400 mb-1 font-bold uppercase">KRW</label>
                    <input id="amount" type="number" inputmode="numeric" placeholder="0" class="w-full border-b-2 border-rose-100 p-2 focus:outline-none focus:border-rose-400 text-2xl font-mono font-bold text-rose-600 bg-transparent">
                </div>
                <div id="jointAmountArea" class="hidden col-span-1 space-y-2">
                    <input id="amountA" type="number" inputmode="numeric" placeholder="冠妤分擔" class="w-full border-b border-rose-200 p-1 focus:outline-none text-sm font-mono text-rose-500">
                    <input id="amountB" type="number" inputmode="numeric" placeholder="哲永分擔" class="w-full border-b border-blue-200 p-1 focus:outline-none text-sm font-mono text-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 mb-1 font-bold uppercase">Item</label>
                    <input id="note" type="text" placeholder="品項名稱" class="w-full border-b-2 border-rose-100 p-2 focus:outline-none focus:border-rose-400 text-lg bg-transparent font-medium">
                </div>
            </div>

            <div id="singlePayArea" class="grid grid-cols-2 gap-3 mb-5">
                <select id="payCategory" onchange="updatePayMethods('')" class="bg-gray-50 rounded-xl p-3 text-xs font-bold text-gray-600 outline-none">
                    <option value="現金">💸 現金</option>
                    <option value="行動支付">📱 行動支付</option>
                    <option value="實體信用卡">💳 信用卡</option>
                </select>
                <select id="payMethod" class="bg-gray-50 rounded-xl p-3 text-xs font-bold text-gray-500 outline-none"></select>
            </div>

            <div class="flex justify-between items-center bg-rose-50/30 rounded-2xl p-4 mb-6 border border-rose-100/50">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="isLateEntry" onchange="toggleLate()" class="w-5 h-5 accent-rose-500">
                    <label for="isLateEntry" class="text-xs font-bold text-gray-500">補記</label>
                    <input id="backDate" type="date" class="hidden ml-1 bg-white border-none rounded-lg px-2 py-1 text-[10px] font-bold text-rose-600 shadow-sm animate-fade-in">
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="isTaxRefund" class="w-5 h-5 accent-cyan-500">
                    <label for="isTaxRefund" class="text-xs font-bold text-gray-500">退稅</label>
                </div>
            </div>

            <button onclick="addRecord()" class="w-full bg-gradient-to-r from-rose-500 to-rose-400 text-white py-4 rounded-2xl font-black shadow-lg shadow-rose-200 active:scale-[0.97] transition-all tracking-widest uppercase">Sync to Cloud</button>
        </div>

        <div class="flex justify-between items-end mb-4 px-2">
            <h2 class="text-rose-900 font-black text-2xl italic tracking-tighter">History.</h2>
            <button onclick="exportToExcel()" class="text-[10px] font-black text-rose-300 border border-rose-100 px-3 py-1 rounded-full hover:bg-rose-50 transition-colors">EXPORT CSV</button>
        </div>
        
        <div id="history" class="space-y-4"></div>
    </div>

    <script>
        window.records = [];
        let currentPayer = '冠妤';
        let privateOwner = '冠妤';
        const avgRate = 0.0214;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('backDate').value = today;
            updatePayMethods('');
        };

        function setPayer(p) {
            currentPayer = p;
            const btns = { '冠妤': 'btnA', '哲永': 'btnB', '共同': 'btnJoint', '個人': 'btnPrivate' };
            Object.keys(btns).forEach(k => {
                const b = document.getElementById(btns[k]);
                if (k === p) b.className = `flex-1 py-2.5 rounded-xl text-xs font-bold transition-all shadow-md text-white ${k==='哲永'?'bg-blue-500':k==='個人'?'bg-purple-600':'bg-rose-500'}`;
                else b.className = 'flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-gray-300 hover:text-gray-400';
            });
            document.getElementById('privateOwnerArea').classList.toggle('hidden', p !== '個人');
            document.getElementById('singleAmountArea').classList.toggle('hidden', p === '共同');
            document.getElementById('jointAmountArea').classList.toggle('hidden', p !== '共同');
            document.getElementById('singlePayArea').classList.toggle('hidden', p === '共同');
        }

        function setPrivateOwner(owner) {
            privateOwner = owner;
            document.getElementById('pBtnA').className = owner === '冠妤' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-500 text-white shadow-sm' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-purple-200';
            document.getElementById('pBtnB').className = owner === '哲永' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-500 text-white shadow-sm' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-purple-200';
        }

        function updatePayMethods(suffix) {
            const cat = document.getElementById('payCategory' + suffix).value;
            const met = document.getElementById('payMethod' + suffix);
            const opts = cat === '現金' ? ['韓元 ₩', '美元 $'] : cat === '行動支付' ? ['Apple Pay', 'Line Pay', '台新 Pay'] : ['實體卡'];
            met.innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
        }

        function toggleLate() { document.getElementById('backDate').classList.toggle('hidden', !document.getElementById('isLateEntry').checked); }

        async function addRecord() {
            const note = document.getElementById('note').value || '未命名消費';
            let amount, amountA = 0, amountB = 0, method = '', finalPayer = currentPayer;

            if (currentPayer === '共同') {
                amountA = parseFloat(document.getElementById('amountA').value) || 0;
                amountB = parseFloat(document.getElementById('amountB').value) || 0;
                amount = amountA + amountB;
                method = '共同分帳';
            } else {
                amount = parseFloat(document.getElementById('amount').value) || 0;
                if (currentPayer === '個人') finalPayer = privateOwner;
                else { if (currentPayer === '冠妤') amountA = amount; if (currentPayer === '哲永') amountB = amount; }
                method = `${document.getElementById('payCategory').value}(${document.getElementById('payMethod').value})`;
            }

            if (amount <= 0) return alert('請輸入金額');

            await window.db_addRecord({
                payer: finalPayer, isPrivate: currentPayer === '個人',
                amount, amountA, amountB, note, method,
                isTaxRefund: document.getElementById('isTaxRefund').checked,
                date: document.getElementById('isLateEntry').checked ? document.getElementById('backDate').value : new Date().toISOString().split('T')[0]
            });

            ['amount', 'amountA', 'amountB', 'note'].forEach(id => document.getElementById(id).value = '');
        }

        async function deleteRecord(id) {
            if (confirm('確定要從雲端刪除這筆紀錄嗎？')) await window.db_deleteRecord(id);
        }

        window.render = () => {
            const historyDiv = document.getElementById('history');
            const summaryText = document.getElementById('summary_text');
            historyDiv.innerHTML = '';
            let totalA = 0, totalB = 0;

            window.records.forEach(r => {
                if (!r.isPrivate) { totalA += (r.amountA || 0); totalB += (r.amountB || 0); }
                const isKW = r.payer === '冠妤';
                const isZY = r.payer === '哲永';
                const color = r.isPrivate ? 'border-purple-100 bg-purple-50/20' : (r.payer === '共同' ? 'border-amber-100 bg-amber-50/20' : (isKW ? 'border-rose-100 bg-white' : 'border-blue-100 bg-white'));

                historyDiv.innerHTML += `
                    <div class="p-5 rounded-[2rem] border ${color} relative animate-fade-in shadow-sm">
                        <button onclick="deleteRecord('${r.id}')" class="absolute top-4 right-4 text-gray-200 hover:text-rose-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                        <div class="flex justify-between items-start">
                            <div class="pr-8">
                                <div class="flex items-center gap-2 mb-1.5">
                                    <span class="font-bold text-gray-800 text-lg">${r.note}</span>
                                    <span class="text-[8px] px-2 py-0.5 rounded-full font-black uppercase ${r.isPrivate?'bg-purple-100 text-purple-500':(isKW?'bg-rose-100 text-rose-500':'bg-blue-100 text-blue-500')}">${r.payer}</span>
                                </div>
                                <div class="text-[10px] text-gray-400 font-bold tracking-tight">📅 ${r.date} · 💳 ${r.method}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-mono font-black text-rose-600 text-xl leading-none mb-1">₩${r.amount.toLocaleString()}</div>
                                <div class="text-[10px] text-gray-300 font-bold italic">≈ NT$ ${Math.round(r.amount * avgRate)}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            const diff = (totalA - totalB) / 2;
            summaryText.innerHTML = totalA+totalB === 0 ? "尚未開始記帳" : (diff > 0 ? `哲永應給冠妤 <b>₩${Math.round(diff).toLocaleString()}</b>` : `冠妤應給哲永 <b>₩${Math.abs(Math.round(diff)).toLocaleString()}</b>`);
        };

        function exportToExcel() {
            let csv = "\ufeff日期,類型,付款人,品項,總額(KRW),支付方式\n";
            window.records.forEach(r => { csv += `${r.date},${r.isPrivate?'個人':'共同'},${r.payer},${r.note},${r.amount},${r.method}\n`; });
            const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `首爾雲端記帳.csv`; a.click();
        }
    </script>
</body>
</html>
