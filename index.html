<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾小帳本 🇰🇷 v16</title>
    <script src="https://cdn.tailwindcss.com"></script>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6kcipt9qW4ySulBTuG8pzmqqceRxjzoA",
            authDomain: "seoul-account.firebaseapp.com",
            projectId: "seoul-account",
            storageBucket: "seoul-account.firebasestorage.app",
            messagingSenderId: "832634318470",
            appId: "1:832634318470:web:2df0dad107aead5ff56b07",
            measurementId: "G-V6FQW3XH57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const recordsCol = collection(db, "korea_v16");

        // 監聽雲端資料變化，同步回全域變數並重新渲染畫面
        const q = query(recordsCol, orderBy("id", "desc"));
        onSnapshot(q, (snapshot) => {
            window.records = snapshot.docs.map(doc => ({ fbId: doc.id, ...doc.data() }));
            if (typeof window.render === 'function') window.render();
        });

        // 匯出 Firebase 操作給下方原生 JS 使用
        window.fbAddRecord = (data) => addDoc(recordsCol, data);
        window.fbDeleteRecord = (fbId) => deleteDoc(doc(db, "korea_v16", fbId));
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .ios-blur { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-rose-50 min-h-screen pb-32">

    <nav class="sticky top-0 z-20 ios-blur border-b border-rose-100 p-4 text-center">
        <h1 class="text-xl font-bold text-rose-600 tracking-tight">首爾小帳本 🇰🇷</h1>
        <div id="summary" class="mt-2 text-sm text-gray-600 font-medium italic">載入中...</div>
    </nav>

    <div class="p-4">
        <div class="bg-white rounded-3xl shadow-sm p-6 mb-6 border border-rose-100">
            
            <div class="mb-4">
                <label class="block text-[10px] text-gray-400 mb-2 font-bold uppercase tracking-wider">類型</label>
                <div class="flex bg-gray-100 rounded-xl p-1 gap-1">
                    <button onclick="setPayer('冠妤')" id="btnA" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-rose-500 text-white shadow-sm">冠妤</button>
                    <button onclick="setPayer('哲永')" id="btnB" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all text-gray-400">哲永</button>
                    <button onclick="setPayer('共同')" id="btnJoint" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all text-gray-400">共同</button>
                    <button onclick="setPayer('個人')" id="btnPrivate" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all text-gray-400">個人(不分帳)</button>
                </div>
            </div>

            <div id="privateOwnerArea" class="hidden mb-4 animate-fade-in">
                <label class="block text-[10px] text-purple-400 mb-2 font-bold uppercase tracking-wider">誰的個人帳？</label>
                <div class="flex bg-purple-50 rounded-xl p-1 gap-1 border border-purple-100">
                    <button onclick="setPrivateOwner('冠妤')" id="pBtnA" class="flex-1 py-1.5 rounded-lg text-[10px] font-bold transition-all bg-purple-500 text-white shadow-sm">冠妤</button>
                    <button onclick="setPrivateOwner('哲永')" id="pBtnB" class="flex-1 py-1.5 rounded-lg text-[10px] font-bold transition-all text-purple-300">哲永</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div id="singleAmountArea">
                    <label class="block text-[10px] text-gray-400 mb-1 font-bold uppercase">金額 (KRW)</label>
                    <input id="amount" type="number" inputmode="numeric" placeholder="0" class="w-full border-b border-rose-100 p-2 focus:outline-none focus:border-rose-400 text-xl font-mono text-rose-600">
                </div>
                <div id="jointAmountArea" class="hidden col-span-1 space-y-2">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-rose-400 font-bold w-8">冠妤</span>
                        <input id="amountA" type="number" inputmode="numeric" placeholder="0" class="flex-1 border-b border-rose-100 p-1 focus:outline-none text-base font-mono text-rose-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-blue-400 font-bold w-8">哲永</span>
                        <input id="amountB" type="number" inputmode="numeric" placeholder="0" class="flex-1 border-b border-rose-100 p-1 focus:outline-none text-base font-mono text-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 mb-1 font-bold uppercase">品項名稱</label>
                    <input id="note" type="text" placeholder="買了啥？" class="w-full border-b border-rose-100 p-2 focus:outline-none focus:border-rose-400 text-lg">
                </div>
            </div>

            <div id="singlePayMethodArea" class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-[10px] text-gray-400 mb-1 font-bold">支付方式</label>
                    <select id="payCategory" onchange="updatePayMethods('')" class="w-full bg-gray-50 border-none rounded-xl p-3 text-xs">
                        <option value="現金">現金</option>
                        <option value="行動支付">行動支付</option>
                        <option value="實體信用卡">實體信用卡</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 mb-1 font-bold">具體細項</label>
                    <select id="payMethod" class="w-full bg-gray-50 border-none rounded-xl p-3 text-xs"></select>
                </div>
            </div>

            <div id="jointPayMethodArea" class="hidden space-y-3 mb-4">
                <div class="grid grid-cols-2 gap-2 p-2 bg-rose-50/30 rounded-xl border border-rose-100">
                    <select id="payCategoryA" onchange="updatePayMethods('A')" class="bg-white rounded-lg p-2 text-[10px]"><option value="現金">現金</option><option value="行動支付">行動支付</option><option value="實體信用卡">實體信用卡</option></select>
                    <select id="payMethodA" class="bg-white rounded-lg p-2 text-[10px]"></select>
                </div>
                <div class="grid grid-cols-2 gap-2 p-2 bg-blue-50/30 rounded-xl border border-blue-100">
                    <select id="payCategoryB" onchange="updatePayMethods('B')" class="bg-white rounded-lg p-2 text-[10px]"><option value="現金">現金</option><option value="行動支付">行動支付</option><option value="實體信用卡">實體信用卡</option></select>
                    <select id="payMethodB" class="bg-white rounded-lg p-2 text-[10px]"></select>
                </div>
            </div>

            <div class="bg-rose-50/50 rounded-2xl p-4 mb-4 border border-rose-100/50 flex justify-between">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="isLateEntry" onchange="toggleLateEntry()" class="w-5 h-5 accent-rose-500 rounded-lg">
                    <label for="isLateEntry" class="text-sm text-gray-700 font-medium">補紀錄</label>
                    <div id="lateEntrySection" class="hidden ml-1">
                        <input id="backDate" type="date" class="bg-white border-none rounded-lg px-2 py-1 text-[10px] text-rose-600 font-bold">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="isTaxRefund" class="w-5 h-5 accent-blue-500 rounded-lg">
                    <label for="isTaxRefund" class="text-sm text-gray-700 font-medium">退稅</label>
                </div>
            </div>

            <div class="mb-4">
                <textarea id="extraRemark" rows="1" placeholder="備註..." class="w-full bg-gray-50 border-none rounded-xl p-3 text-xs focus:ring-2 focus:ring-rose-200"></textarea>
            </div>

            <button onclick="addRecord()" class="w-full bg-rose-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">確認送出</button>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-rose-900 font-black text-xl italic">History.</h2>
            <div class="flex gap-2">
                <select id="viewFilter" onchange="render()" class="text-[10px] font-bold border-2 border-rose-100 px-2 py-1 rounded-full bg-white text-rose-500 outline-none">
                    <option value="全部">全部顯示</option>
                    <option value="冠妤">冠妤帳務</option>
                    <option value="哲永">哲永帳務</option>
                </select>
                <button onclick="exportToExcel()" class="text-rose-500 text-[10px] font-black border-2 border-rose-100 px-3 py-1 rounded-full bg-white">CSV</button>
            </div>
        </div>
        
        <div id="history" class="space-y-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 text-center">
        <button onclick="clearAll()" class="text-[10px] text-gray-300 underline font-bold tracking-widest uppercase">Reset Data</button>
    </div>

    <script>
        window.records = []; // 移除 LocalStorage，改由上方的 Firebase 監聽器載入
        let currentPayer = '冠妤';
        let privateOwner = '冠妤';
        const avgRate = 0.0214;

// 使用在地 ISO 格式 YYYY-MM-DD
        const getLocalDateStr = (dateObj = new Date()) => dateObj.toLocaleDateString('en-CA');

        window.onload = function() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            document.getElementById('backDate').value = getLocalDateStr(yesterday);
            ['', 'A', 'B'].forEach(s => updatePayMethods(s));
            window.render = render;
            render();
        };

        function setPayer(p) {
            currentPayer = p;
            const btnIds = { '冠妤': 'btnA', '哲永': 'btnB', '共同': 'btnJoint', '個人': 'btnPrivate' };
            Object.keys(btnIds).forEach(k => {
                const btn = document.getElementById(btnIds[k]);
                if (k === p) {
                    btn.className = `flex-1 py-2 rounded-lg text-xs font-bold transition-all shadow-sm text-white ${k==='哲永'?'bg-blue-500':k==='個人'?'bg-purple-500':'bg-rose-500'}`;
                } else {
                    btn.className = 'flex-1 py-2 rounded-lg text-xs font-bold transition-all text-gray-400';
                }
            });
            document.getElementById('privateOwnerArea').classList.toggle('hidden', p !== '個人');
            document.getElementById('singleAmountArea').classList.toggle('hidden', p === '共同');
            document.getElementById('jointAmountArea').classList.toggle('hidden', p !== '共同');
            document.getElementById('singlePayMethodArea').classList.toggle('hidden', p === '共同');
            document.getElementById('jointPayMethodArea').classList.toggle('hidden', p !== '共同');
        }

        function setPrivateOwner(owner) {
            privateOwner = owner;
            document.getElementById('pBtnA').className = owner === '冠妤' ? 'flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-purple-500 text-white shadow-sm' : 'flex-1 py-1.5 rounded-lg text-[10px] font-bold text-purple-300';
            document.getElementById('pBtnB').className = owner === '哲永' ? 'flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-purple-500 text-white shadow-sm' : 'flex-1 py-1.5 rounded-lg text-[10px] font-bold text-purple-300';
        }

        function updatePayMethods(suffix = '') {
            const cat = document.getElementById('payCategory' + suffix).value;
            const met = document.getElementById('payMethod' + suffix);
            let opts = cat === '現金' ? ['韓元', '美元'] : cat === '行動支付' ? ['Apple Pay', 'Line Pay', '台新 Pay'] : ['實體卡'];
            met.innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
        }

        function toggleLateEntry() { document.getElementById('lateEntrySection').classList.toggle('hidden', !document.getElementById('isLateEntry').checked); }

        function addRecord() {
            let amount, amountA = 0, amountB = 0, method = '', finalPayer = currentPayer;
            const note = document.getElementById('note').value || '未命名消費';
            if (currentPayer === '共同') {
                amountA = parseFloat(document.getElementById('amountA').value) || 0;
                amountB = parseFloat(document.getElementById('amountB').value) || 0;
                amount = amountA + amountB;
                method = `共: ${document.getElementById('payCategoryA').value}/${document.getElementById('payCategoryB').value}`;
            } else {
                amount = parseFloat(document.getElementById('amount').value) || 0;
                if (currentPayer === '個人') finalPayer = privateOwner;
                else { if (currentPayer === '冠妤') amountA = amount; if (currentPayer === '哲永') amountB = amount; }
                method = `${document.getElementById('payCategory').value}(${document.getElementById('payMethod').value})`;
            }
            if (amount <= 0) return alert('請輸入金額');
// 將新增資料丟給 Firebase
            window.fbAddRecord({
                id: Date.now(), payer: finalPayer, isPrivate: currentPayer === '個人',
                amount, amountA, amountB, note, method,
                isTaxRefund: document.getElementById('isTaxRefund').checked,
                isLate: document.getElementById('isLateEntry').checked,
                date: document.getElementById('isLateEntry').checked ? document.getElementById('backDate').value : new Date().toISOString().split('T')[0],
                remark: document.getElementById('extraRemark').value
            });
            resetForm(); 
            // 不需要手動 render()，Firebase 監聽器會自動處理
        }

        function deleteRecord(fbId) {
            if (confirm('確定要刪除這筆紀錄嗎？')) {
                // 將刪除指令丟給 Firebase
                window.fbDeleteRecord(fbId);
            }
        }

        function resetForm() { ['amount', 'amountA', 'amountB', 'note', 'extraRemark'].forEach(id => document.getElementById(id).value = ''); }

        function render() {
            const historyDiv = document.getElementById('history');
            const summaryDiv = document.getElementById('summary');
            const viewFilter = document.getElementById('viewFilter').value;
            historyDiv.innerHTML = '';
            let totalA = 0, totalB = 0;

// 改用全域的 window.records
            window.records.forEach(r => {
                if (!r.isPrivate) { totalA += r.amountA; totalB += r.amountB; }
                if (viewFilter !== '全部' && (r.payer !== '共同' && r.payer !== viewFilter)) return;

                const cardColor = r.isPrivate ? 'border-purple-100 bg-purple-50/10' : (r.payer === '共同' ? 'border-amber-100' : (r.payer === '冠妤' ? 'border-rose-100' : 'border-blue-100'));
                const badgeColor = r.isPrivate ? 'bg-purple-100 text-purple-600' : (r.payer === '共同' ? 'bg-amber-100 text-amber-600' : (r.payer === '冠妤' ? 'bg-rose-100 text-rose-600' : 'bg-blue-100 text-blue-600'));

                historyDiv.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border ${cardColor} relative animate-fade-in">
                        <button onclick="deleteRecord('${r.fbId}')" class="absolute top-3 right-3 text-gray-300 hover:text-rose-400 p-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                        <div class="flex justify-between items-start pr-6">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="font-bold text-gray-800">${r.note}</span>
                                    <span class="${badgeColor} text-[8px] px-1.5 py-0.5 rounded-full font-bold uppercase">${r.isPrivate? 'Private·' + r.payer : r.payer}</span>
                                    ${r.isTaxRefund ? '<span class="bg-cyan-100 text-cyan-600 text-[8px] px-1 rounded">TAX</span>' : ''}
                                </div>
                                <div class="text-[9px] text-gray-400 font-medium">📅 ${r.date} · 💳 ${r.method}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-mono font-bold text-rose-600">₩${r.amount.toLocaleString()}</div>
                                <div class="text-[9px] text-gray-300">NT$ ${Math.round(r.amount * avgRate)}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            const diff = (totalA - totalB) / 2;
            if (totalA + totalB === 0) summaryDiv.innerHTML = "尚未有共同支出";
            else summaryDiv.innerHTML = diff > 0 ? `哲永應給冠妤 <b class="text-rose-600 font-black">₩${Math.abs(Math.round(diff)).toLocaleString()}</b>` : `冠妤應給哲永 <b class="text-blue-600 font-black">₩${Math.abs(Math.round(diff)).toLocaleString()}</b>`;
        }

        function exportToExcel() {
            let csv = "\ufeff日期,類型,付款人,品項,總額(KRW),冠妤出,哲永出,支付方式,退稅,備註\n";
window.records.forEach(r => { csv += `${r.date},${r.isPrivate?'個人私物':'共同分帳'},${r.payer},${r.note},${r.amount},${r.amountA},${r.amountB},${r.method},${r.isTaxRefund?'是':'否'},"${r.remark}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `首爾記帳_v16.csv`; a.click();
        }

        function clearAll() { if(confirm('確定重置嗎？')) { window.records.forEach(r => window.fbDeleteRecord(r.fbId)); } }
    </script>
</body>
</html>
